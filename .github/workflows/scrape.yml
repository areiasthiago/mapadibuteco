name: Scrape Butecos

on:
  workflow_dispatch:  # Disparo manual pelo painel do Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        run: node .github/scripts/scrape.mjs

      - name: Commit results
        run: |
          git config --global user.email "scraper@mapadibuteco"
          git config --global user.name "Mapa di Buteco Scraper"
          git add src/data/butecos-scraped.json
          git diff --staged --quiet || git commit -m "data: scraping $(date '+%Y-%m-%d')"
          git push
